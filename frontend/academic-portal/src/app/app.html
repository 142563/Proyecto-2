<div class="min-h-screen bg-slate-100 text-slate-900">
  <header class="border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a routerLink="/dashboard" class="text-xl font-bold tracking-tight text-slate-800">Academic Portal</a>

      <nav class="flex items-center gap-2" *ngIf="auth.isAuthenticated()">
        <a routerLink="/dashboard" routerLinkActive="nav-active" class="nav-link">Dashboard</a>
        <a *ngIf="isStudent()" routerLink="/transfers" routerLinkActive="nav-active" class="nav-link">Traslados</a>
        <a *ngIf="isStudent()" routerLink="/courses" routerLinkActive="nav-active" class="nav-link">Cursos</a>
        <a routerLink="/payments" routerLinkActive="nav-active" class="nav-link">Pagos</a>
        <a *ngIf="isStudent()" routerLink="/certificates" routerLinkActive="nav-active" class="nav-link">Certificados</a>
        <a *ngIf="isAdmin()" routerLink="/admin-reports" routerLinkActive="nav-active" class="nav-link">Reportes</a>
        <button class="ml-3 rounded-lg bg-slate-800 px-3 py-2 text-xs font-semibold text-white" (click)="logout()">Salir</button>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6">
    <router-outlet></router-outlet>
  </main>
</div>
